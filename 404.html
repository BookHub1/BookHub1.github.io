<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — BookHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; }
    .wrap { max-width:480px; padding:40px 24px; }
    .big-num { font-size:96px; font-weight:800; line-height:1;
               background:var(--brand-grad); -webkit-background-clip:text;
               -webkit-text-fill-color:transparent; background-clip:text; }
    .msg { font-size:18px; color:var(--text2); margin:16px 0 28px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="big-num">404</div>
    <h1 style="margin:12px 0 8px;">Page not found</h1>
    <p class="msg">The page you're looking for doesn't exist or was moved.</p>
    <a href="./index.html" class="btn btn-primary btn-lg">← Back to BookHub</a>
  </div>
  <script src="./auth.js"></script>
</body>
</html>
